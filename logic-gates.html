    <section id="gates">
        <h2>The Building Blocks</h2>
        <div class="gate-grid">
            <div class="gate-card">
                <h3>AND Gate</h3>
                <p>Output is high only if all inputs are high.</p>
                <code>Y = A • B</code>
            </div>
            <div class="gate-card">
                <h3>OR Gate</h3>
                <p>Output is high if at least one input is high.</p>
                <code>Y = A + B</code>
            </div>
        </div>
    </section>
